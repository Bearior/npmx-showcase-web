<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfeff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cffafe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg1)" rx="200"/>
  <!-- Doctor figure with stethoscope -->
  <circle cx="200" cy="140" r="50" fill="#0e7490"/>
  <rect x="170" y="195" width="60" height="90" rx="12" fill="#0891b2"/>
  <!-- Stethoscope -->
  <path d="M175,220 C140,220 130,250 150,265" stroke="#155e75" stroke-width="4" fill="none"/>
  <circle cx="150" cy="268" r="8" fill="#155e75"/>
  <!-- Cross on coat -->
  <rect x="192" y="210" width="16" height="40" rx="3" fill="white" opacity="0.8"/>
  <rect x="184" y="222" width="32" height="14" rx="3" fill="white" opacity="0.8"/>
  <!-- Name plate -->
  <rect x="120" y="310" width="160" height="50" rx="12" fill="white" opacity="0.9"/>
  <text x="200" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#155e75">นพ. สมศักดิ์ รักษ์ดี</text>
  <text x="200" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">นักกายภาพบำบัด</text>
</svg>
